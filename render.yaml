# Render Blueprint — deploys the Remembrance Place site.
# https://render.com/docs/blueprint-spec
#
# On deploy, Render reads this file and asks you to fill in the values marked
# "sync: false" (your secrets). No disk is required — media lives in Cloudflare R2.
services:
  - type: web
    name: remembrance-place
    runtime: node
    plan: free # sleeps when idle; change to "starter" to keep it always-on
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: ADMIN_KEY
        sync: false # your private key for the download-all link (make it long)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false # e.g. remembrance-media
      - key: MAX_FILE_MB
        value: "500"
      # Optional: only if you make the R2 bucket public (custom domain / r2.dev).
      # - key: R2_PUBLIC_BASE_URL
      #   sync: false
