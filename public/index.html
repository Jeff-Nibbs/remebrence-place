<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In Loving Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow" id="site-title">In Loving Memory</p>
      <h1 id="person-name">&nbsp;</h1>
      <p class="hero-dates" id="person-dates"></p>
      <div class="hero-divider" aria-hidden="true">✦</div>
      <p class="hero-message" id="hero-message"></p>
      <a class="hero-cta" href="#share">Share a Memory</a>
    </div>
  </header>

  <main>
    <section class="share" id="share">
      <h2>Share a Memory</h2>
      <p class="section-sub" id="upload-prompt"></p>

      <form id="upload-form" class="upload-card">
        <label class="field">
          <span>Your name</span>
          <input type="text" name="name" id="uploader-name" placeholder="e.g. Aunt Mary" maxlength="100" required>
        </label>

        <label class="field">
          <span>A memory or message <em>(optional)</em></span>
          <textarea name="message" id="uploader-message" rows="3" maxlength="2000"
            placeholder="Tell us about this photo or video, or share a favorite memory…"></textarea>
        </label>

        <div class="dropzone" id="dropzone" tabindex="0" role="button"
             aria-label="Click or drag files here to upload">
          <input type="file" id="file-input" accept="image/*,video/*,.heic,.heif,.mov,.mp4,.avi,.mkv" multiple hidden>
          <div class="dropzone-icon" aria-hidden="true">🕊️</div>
          <p class="dropzone-title">Click here or drag photos &amp; videos</p>
          <p class="dropzone-hint">You can add several at once</p>
        </div>

        <ul class="file-list" id="file-list"></ul>

        <div class="progress-wrap" id="progress-wrap" hidden>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <p class="progress-text" id="progress-text">Uploading…</p>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn" disabled>Share with the Family</button>
        <p class="form-status" id="form-status" role="status"></p>
      </form>
    </section>

    <section class="gallery-section">
      <h2>Memories Shared</h2>
      <p class="section-sub" id="gallery-count"></p>
      <div class="gallery" id="gallery"></div>
      <p class="gallery-empty" id="gallery-empty" hidden>
        No memories have been shared yet. Be the first — every photo and video helps.
      </p>
    </section>
  </main>

  <footer>
    <p id="footer-message"></p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
