<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>In Loving Memory — Honorina Carvalho DeSousa Arruda</title>
<meta name="description" content="A remembrance album for Honorina Carvalho DeSousa Arruda, April 6, 1938 — July 6, 2026.">
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">

<body>

<header class="hero">

  <p class="eyebrow">In Loving Memory</p>
  <h1 class="name">Honorina Carvalho DeSousa Arruda</h1>
  <p class="dates">April 6, 1938 &mdash; July 6, 2026</p>
  <p class="tagline">Forever in our hearts.</p>
</header>

<main>
  <div id="album" class="album" aria-label="Photo album"></div>
  <noscript>
    <p class="notice">This album needs JavaScript to load the photos.</p>

<footer class="footer">
  <p id="thanks" class="thanks"></p>
  <p class="footer-message">Thank you for helping us remember Honorina Carvalho DeSousa Arruda.</p>
</footer>

<button id="toTop" class="to-top" type="button" aria-label="Back to top" hidden>

  </button>
  <button class="lb-nav lb-next" type="button" aria-label="Next photo">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M8.6 7.4L10 6l6 6-6 6-1.4-1.4 4.6-4.6z"/></svg>
  </button>
  <div class="lb-stage"><img id="lbImage" alt="Photo of Honorina"></div>
  <p id="lbCount" class="lb-count"></p>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
